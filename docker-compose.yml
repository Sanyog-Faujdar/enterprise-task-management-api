version: "3.9"

services:

  db:
    image: postgres:16
    container_name: task-db

    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: task-api

    restart: always

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "5000:5000"

volumes:
  postgres_data: